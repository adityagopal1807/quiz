<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Favorite Person 💌</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --blush:#ffe5ec;
  --blush-soft:#fff3f6;
  --cream:#fffaf6;
  --rose:#e84a8f;
  --rose-deep:#c93074;
  --plum:#4a2236;
  --plum-soft:#8a5a6e;
  --gold:#f4c95d;
  --mint:#bfe8d4;
  --shadow:rgba(200,80,140,0.18);
}

*{ box-sizing:border-box; }

body{
    font-family:'Poppins', sans-serif;
    background:
      radial-gradient(circle at 15% 10%, #ffd9e6 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, #f8e3ff 0%, transparent 40%),
      radial-gradient(circle at 50% 90%, #ffe9d6 0%, transparent 45%),
      linear-gradient(160deg,#fff5f8,#fdf0fb 50%,#fff7ef);
    background-attachment:fixed;
    margin:0;
    padding:0;
    color:var(--plum);
    min-height:100vh;
    overflow-x:hidden;
}

/* ---------- floating ambience ---------- */
.floaters{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}
.floaters span{
  position:absolute;
  bottom:-10%;
  font-size:22px;
  opacity:0.5;
  animation:rise linear infinite;
  filter:drop-shadow(0 2px 6px rgba(232,74,143,0.15));
}
@keyframes rise{
  0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
  10%{ opacity:0.55; }
  90%{ opacity:0.4; }
  100%{ transform:translateY(-115vh) translateX(20px) rotate(25deg); opacity:0; }
}

/* ---------- envelope intro ---------- */
#envelopeScreen{
  position:fixed;
  inset:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 50% 30%, #ffd9e6 0%, transparent 55%),
    linear-gradient(160deg,#fff0f5,#fbe7fb 55%,#fff3e8);
  transition:opacity .7s ease, visibility .7s ease;
}
#envelopeScreen.hide{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.envelope-wrap{
  text-align:center;
  padding:30px;
  max-width:520px;
}

.little-heart{
  font-size:46px;
  display:inline-block;
  animation:beat 1.35s ease-in-out infinite;
  filter:drop-shadow(0 6px 14px rgba(232,74,143,0.35));
}
@keyframes beat{
  0%,100%{ transform:scale(1); }
  18%{ transform:scale(1.18); }
  32%{ transform:scale(0.96); }
  45%{ transform:scale(1.1); }
  60%{ transform:scale(1); }
}

.envelope-title{
  font-family:'Playfair Display', serif;
  font-style:italic;
  font-weight:600;
  font-size:30px;
  color:var(--rose-deep);
  margin:18px 0 6px;
  letter-spacing:0.3px;
}

.envelope-note{
  font-family:'Caveat', cursive;
  font-size:26px;
  line-height:1.5;
  color:var(--plum-soft);
  margin:14px 0 28px;
}

.open-btn{
  font-family:'Poppins', sans-serif;
  font-weight:600;
  font-size:15px;
  letter-spacing:0.3px;
  padding:14px 34px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,var(--rose),var(--rose-deep));
  color:#fff;
  cursor:pointer;
  box-shadow:0 10px 24px var(--shadow);
  transition:transform .25s ease, box-shadow .25s ease;
}
.open-btn:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 14px 30px rgba(200,48,116,0.3);
}
.open-btn:active{ transform:scale(0.98); }

/* ---------- main page ---------- */
.container{
    position:relative;
    z-index:2;
    max-width:760px;
    margin:auto;
    padding:48px 20px 80px;
    opacity:0;
}
.container.reveal{
  animation:fadeUp .8s ease forwards;
}
@keyframes fadeUp{
  from{ opacity:0; transform:translateY(18px); }
  to{ opacity:1; transform:translateY(0); }
}

.hero{
  text-align:center;
  margin-bottom:42px;
}

.eyebrow{
  font-family:'Poppins',sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--rose);
  margin-bottom:10px;
}

h1{
    text-align:center;
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-style:italic;
    color:var(--plum);
    font-size:clamp(30px,6vw,44px);
    margin:0 0 14px;
    line-height:1.15;
}
h1 .accent{
  color:var(--rose-deep);
}

.hero-sub{
  font-family:'Caveat', cursive;
  font-size:22px;
  color:var(--plum-soft);
  max-width:480px;
  margin:0 auto;
  line-height:1.4;
}

.progress-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:22px;
  padding:8px 18px;
  background:var(--blush-soft);
  border:1px solid #ffd2e2;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  color:var(--rose-deep);
}
.progress-pill .dot{
  width:6px; height:6px;
  border-radius:50%;
  background:var(--gold);
}

.card{
    background:var(--cream);
    padding:26px 26px 24px;
    margin-bottom:18px;
    border-radius:22px;
    box-shadow:0 10px 28px var(--shadow);
    border:1px solid #ffe3ec;
    position:relative;
    overflow:hidden;
}
.card::before{
  content:"";
  position:absolute;
  top:0; left:0;
  width:5px; height:100%;
  background:linear-gradient(180deg,var(--rose),var(--gold));
  opacity:0.85;
}

.q-tag{
  display:inline-block;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.8px;
  text-transform:uppercase;
  color:#fff;
  background:linear-gradient(135deg,var(--rose),var(--rose-deep));
  padding:4px 12px;
  border-radius:999px;
  margin-bottom:12px;
}

.q-number{
  font-family:'Playfair Display', serif;
  font-style:italic;
  color:var(--rose-deep);
  font-weight:700;
  margin-right:6px;
}

.question{
    font-size:16.5px;
    font-weight:600;
    margin-bottom:16px;
    line-height:1.55;
    color:var(--plum);
    white-space:pre-line;
}
.question code, .question pre{
  font-family:'SF Mono', Consolas, monospace;
}

.option{
    display:flex;
    align-items:center;
    gap:10px;
    margin:9px 0;
    padding:13px 16px;
    border-radius:14px;
    background:var(--blush-soft);
    border:1.5px solid transparent;
    cursor:pointer;
    font-size:14.5px;
    font-weight:500;
    color:var(--plum);
    transition:all .18s ease;
}

.option:hover{
    background:var(--blush);
    border-color:#ffc2d9;
    transform:translateX(2px);
}

.option input{
  accent-color:var(--rose-deep);
  width:16px; height:16px;
  cursor:pointer;
  flex-shrink:0;
}

.submit-wrap{
  position:sticky;
  bottom:18px;
  z-index:5;
  margin-top:30px;
}

button.submit-btn{
    width:100%;
    padding:17px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,var(--rose),var(--rose-deep));
    color:white;
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:16px;
    letter-spacing:0.3px;
    cursor:pointer;
    box-shadow:0 14px 30px var(--shadow);
    transition:transform .2s ease, box-shadow .2s ease;
}

button.submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 18px 36px rgba(200,48,116,0.32);
}
button.submit-btn:active{ transform:scale(0.99); }

#result{
    margin-top:30px;
    display:none;
}

.correct{
    color:#2e9e6b;
    font-weight:600;
}

.wrong{
    color:#e0567a;
    font-weight:600;
}

.answer-box{
  margin-top:12px;
  animation:fadeIn .3s ease;
}

@keyframes fadeIn{
  from{ opacity:0; transform:translateY(10px); }
  to{ opacity:1; transform:translateY(0); }
}

.score-card{
  text-align:center;
  padding:38px 26px;
  background:linear-gradient(160deg,var(--cream),var(--blush-soft));
  border:1px solid #ffd9e8;
}
.score-card .heart-row{
  font-size:28px;
  margin-bottom:8px;
  letter-spacing:4px;
}
.score-label{
  font-family:'Caveat',cursive;
  font-size:24px;
  color:var(--plum-soft);
  margin-bottom:4px;
}
.score{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:700;
    font-size:40px;
    color:var(--rose-deep);
}
.score-note{
  font-family:'Caveat',cursive;
  font-size:22px;
  color:var(--plum-soft);
  margin-top:12px;
  max-width:420px;
  margin-left:auto;
  margin-right:auto;
  line-height:1.4;
}

.review-divider{
  text-align:center;
  margin:36px 0 22px;
  font-family:'Playfair Display',serif;
  font-style:italic;
  color:var(--rose-deep);
  font-size:22px;
  position:relative;
}
.review-divider::before,
.review-divider::after{
  content:"";
  position:absolute;
  top:50%;
  width:28%;
  height:1px;
  background:#ffc9dc;
}
.review-divider::before{ left:0; }
.review-divider::after{ right:0; }

.review-item{
  background:var(--cream);
  border-radius:16px;
  padding:14px 18px;
  margin-bottom:10px;
  font-size:14px;
  line-height:1.6;
  border:1px solid #ffe3ec;
}

@media (max-width:480px){
  .card{ padding:20px 18px; }
  .envelope-title{ font-size:25px; }
  .envelope-note{ font-size:22px; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; }
}

</style>
</head>

<body>

<div class="floaters" id="floaters"></div>

<!-- Envelope / welcome screen -->
<div id="envelopeScreen">
  <div class="envelope-wrap">
    <span class="little-heart">💌</span>
    <div class="envelope-title">Hey love, I made you something</div>
    <p class="envelope-note">
      Fifty little questions, all wrapped up for you —<br>
      part quiz, part love note.<br>
      Open it whenever you're ready 🤍
    </p>
    <button class="open-btn" onclick="openEnvelope()">Open it for me ✨</button>
  </div>
</div>

<div class="container" id="mainContainer">

<div class="hero">
  <div class="eyebrow">made with love, for you</div>
  <h1>The <span class="accent">Pookie</span> Placement Quiz 🎀</h1>
  <p class="hero-sub">let's see how sharp that pretty little brain of yours is, babe 💗</p>
  <div class="progress-pill"><span class="dot"></span> 50 questions, all for you</div>
</div>

<form id="quizForm"></form>

<div class="submit-wrap">

<div id="result"></div>

</div>

<script>

// gentle floating hearts in the background
(function(){
  const wrap=document.getElementById('floaters');
  const emojis=['💗','✨','🎀','💖','🩷'];
  const count=14;
  for(let i=0;i<count;i++){
    const el=document.createElement('span');
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+'%';
    el.style.fontSize=(14+Math.random()*16)+'px';
    el.style.animationDuration=(10+Math.random()*14)+'s';
    el.style.animationDelay=(Math.random()*10)+'s';
    wrap.appendChild(el);
  }
})();

function openEnvelope(){
  document.getElementById('envelopeScreen').classList.add('hide');
  document.getElementById('mainContainer').classList.add('reveal');
}

const questions = [

},

options:["DFS","BFS","Two Pointers","Binary Search"],

const quizForm=document.getElementById("quizForm");

questions.forEach((item,index)=>{

// pull the [Tag] out of the question text so it can be its own pill
let tagMatch=item.q.match(/^\[(.*?)\]\s*/);
let tag=tagMatch?tagMatch[1]:"";
let body=tagMatch?item.q.slice(tagMatch[0].length):item.q;

let html=`
<div class="card">
${tag?`<span class="q-tag">${tag}</span>`:""}
<div class="question"><span class="q-number">Q${index+1}.</span>${body}</div>
`;

item.options.forEach(option=>{
html+=`
<label class="option">
<input type="radio"
name="q${index}"
value="${option}">
 ${option}
</label>
`;
});

html+=`</div>`;

quizForm.innerHTML+=html;
});

const sweetNotes=[
  "you make even the trickiest data structures look easy, babe 💗",
  "every single answer made me fall for you a little more 🎀",
  "smart, cute, and mine — what a combo ✨",
  "I'd debug code with you any day 💖",
  "certified pookie, certified genius 🩷"
];

function submitQuiz(){

let score=0;
let review="";

questions.forEach((q,index)=>{

let selected=document.querySelector(
`input[name="q${index}"]:checked`
);

let userAns=selected ? selected.value : "Not Answered";

const options=document.querySelectorAll(
`input[name="q${index}"]`
);

options.forEach(option=>{

const label=option.parentElement;

if(option.value===q.answer){
label.style.background="#e3f6ec";
label.style.borderColor="#7fd6ab";
}

if(option.checked && option.value!==q.answer){
label.style.background="#fde3ea";
label.style.borderColor="#f3a9c2";
}

option.disabled=true;
});

const card=document.querySelectorAll(".card")[index];

const answerBox=document.createElement("div");

answerBox.innerHTML=`

<div style="
margin-top:14px;
padding:12px 16px;
background:#f3fbf6;
border-left:4px solid #2e9e6b;
border-radius:10px;
font-weight:600;
font-size:13.5px;
color:#1f6b48;">
✔ Correct Answer: ${q.answer}
</div>
`;

card.appendChild(answerBox);

if(userAns===q.answer){
score++;

review+=`
<div class="review-item">
<p class="correct" style="margin:0;">✅ Q${index+1}: Correct</p>
</div>`;
}
else{
review+=`
<div class="review-item">
<p class="wrong" style="margin:0;">❌ Q${index+1}: Your Answer — ${userAns}</p>
<p style="margin:4px 0 0; color:var(--plum-soft);">✔ Correct Answer: ${q.answer}</p>
</div>`;
}
});

const pct=score/questions.length;
const note=sweetNotes[Math.min(sweetNotes.length-1, Math.floor(pct*sweetNotes.length))];

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`

<div class="card score-card">
<div class="heart-row">💗 🎀 💗</div>
<div class="score-label">my favorite person scored</div>
<div class="score">${score} / ${questions.length}</div>
<p class="score-note">${note}</p>
</div>

<div class="review-divider">answer review</div>
${review}
`;

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});
}

</script>

</body>
</html>
