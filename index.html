<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎀 Pookie Placement Quiz 🎀</title>

<style>
body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#ffd6e8,#ffeaf4,#e6d6ff);
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    color:#ff4d88;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.question{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.option{
    display:block;
    margin:8px 0;
    padding:10px;
    border-radius:10px;
    background:#fff0f6;
    cursor:pointer;
}

.option:hover{
    background:#ffd6e8;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#ff66a3;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#ff3385;
}

#result{
    margin-top:20px;
    display:none;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
    
}
.answer-box{
margin-top:10px;
animation:fadeIn .3s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}
    

.score{
    text-align:center;
    font-size:28px;
    color:#ff4d88;
}
</style>
</head>

const quizForm=document.getElementById("quizForm");

questions.forEach((item,index)=>{

let html=`
<div class="card">
<div class="question">
Q${index+1}. ${item.q}
</div>
`;

item.options.forEach(option=>{
html+=`
<label class="option">
<input type="radio"
name="q${index}"
value="${option}">
 ${option}
</label>
`;
});

html+=`</div>`;

quizForm.innerHTML+=html;
});

function submitQuiz(){

let score=0;
let review="";

questions.forEach((q,index)=>{

let selected=document.querySelector(
`input[name="q${index}"]:checked`
);

let userAns=selected ? selected.value : "Not Answered";

const options=document.querySelectorAll(
`input[name="q${index}"]`
);

options.forEach(option=>{

const label=option.parentElement;

if(option.value===q.answer){
label.style.background="#d4edda";
label.style.border="2px solid green";
}

if(option.checked && option.value!==q.answer){
label.style.background="#f8d7da";
label.style.border="2px solid red";
}

option.disabled=true;
});

const card=document.querySelectorAll(".card")[index];

const answerBox=document.createElement("div");

answerBox.innerHTML=`

<div style="
margin-top:12px;
padding:10px;
background:#f8f9fa;
border-left:5px solid green;
border-radius:8px;
font-weight:bold;">
✔ Correct Answer: ${q.answer}
</div>
`;

card.appendChild(answerBox);

if(userAns===q.answer){
score++;

review+=`

<p class="correct">
✅ Q${index+1}: Correct
</p>`;
}
else{
review+=`
<p class="wrong">
❌ Q${index+1}: Your Answer: ${userAns}
<br>
✔ Correct Answer: ${q.answer}
</p>`;
}
});

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`

<div class="card">
<div class="score">
🎀 Your Score: ${score}/${questions.length}
</div>
<hr>
<h2>Answer Review</h2>
${review}
</div>
`;

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});
}

</html>
